<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    <div class="sidebar">
        <div class="sidebar-logo">TaskFlow</div>
        <nav>
            <a href="#">Projetos</a>
            <a href="#">Tarefas</a>
            <a href="#">Perfil</a>
        </nav>
        <button id="btn-sair">Sair</button>
    </div>

    <div class="content">
        <div class="stats">
            <div class="stat-card">
                <span class="stat-number">0</span>
                <span class="stat-label">Projetos</span>
            </div>
            <div class="stat-card">
                <span class="stat-number">0</span>
                <span class="stat-label">Tarefas</span>
            </div>
            <div class="stat-card">
                <span class="stat-number">0</span>
                <span class="stat-label">Concluídas</span>
            </div>
        </div>
        <div class="projects-section">
            <div class="section-header">
                <h2>Meus Projetos</h2>
                <button id="btn-add">+ Novo Projeto</button>
            </div>
            <div class="projects-grid" id="projects-grid"></div>
        </div>
    </div>

    <div id="modal" style="display:none">
        <div class="modal-card">
            <h2>Novo Projeto</h2>
            <input type="text" id="nome-projeto" placeholder="Nome do projeto">
            <input type="text" id="desc-projeto" placeholder="Descrição">
            <button id="btn-criar">Criar</button>
            <button id="btn-cancelar">Cancelar</button>
        </div>
    </div>

    <div id="toast" style="display:none">
        <p>✅Projeto criado com sucesso!</p>
        <div id="toast-bar"></div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
